<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>When & Where</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arima:wght@100..700&family=Cause:wght@100..900&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
</head>

<body class="page-when">

<!-- NAV -->
<div class="nav" onclick="location.href='index.html'">
  <img src="house.png">
</div>

<div class="when-wrapper">

  <!-- ВЕРХНИЙ ДЕКОР -->
  <img src="when_big.png" class="img-left-top">

  <!-- ОСНОВНОЙ GRID -->
  <div class="when-main">

    <!-- LEFT (пусто под декор) -->
    <div class="when-col"></div>

    <!-- CENTER (ТЕКСТ) -->
    <div class="when-col">
      <div class="when-content">

        <p class="date">May 16 | 5 PM</p>
        <p class="street">Cuza Vodă 30/1</p>
        <p class="city">Chisinau, Moldova</p>

        <p class="place">
          <a href="https://www.instagram.com/loftclub.md" target="_blank">
            Space LOFT
          </a>
        </p>

      </div>
    </div>

    <!-- RIGHT (КАРТА + ФОТО) -->
    <div class="when-col">
      <div class="when-image">

        <a href="https://www.google.com/maps" target="_blank">
          <img src="map.png" class="map-img">
        </a>

        <img src="W&W.jpg" class="img-me">

      </div>
    </div>

  </div>

  <!-- НИЖНИЕ ШАГИ -->
  <div class="when-steps">

    <img src="step_one.jpg" onclick="openModal(this)">
    <img src="step_two.jpg" onclick="openModal(this)">
    <img src="step_three.jpg" onclick="openModal(this)">

  </div>

</div>

<!-- MODAL -->
<div id="imageModal" class="image-modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>
function openModal(img) {
  document.getElementById("modalImg").src = img.src;
  document.getElementById("imageModal").classList.add("active");
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("active");
}
</script>

</body>
</html>
